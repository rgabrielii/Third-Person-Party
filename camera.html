<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Third Person Party Cam</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

iframe{
width:90%;
height:400px;
border:none;
margin-top:20px;
}

#qr{
margin-top:30px;
}
</style>
</head>

<body>

<h1>Start Third Person Party-Cam</h1>

<button onclick="start()">Start Camera</button>

<div id="cam"></div>

<div id="qr"></div>

<script>

function start(){

const room = Math.random().toString(36).substring(2,8)

const camURL =
"https://vdo.ninja/?push="+room+
"&webcam&autostart&cleanoutput"

const vrURL =
window.location.origin +
window.location.pathname.replace("camera.html","vr.html") +
"?room="+room

document.getElementById("cam").innerHTML =
'<iframe src="'+camURL+'"></iframe>'

const canvas = document.createElement("canvas")
document.getElementById("qr").appendChild(canvas)

QRCode.toCanvas(canvas, vrURL,{width:250})

}

</script>

</body>
</html>
