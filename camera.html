<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Third Person Party Cam</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

button{
font-size:22px;
padding:15px 30px;
}

#guide{
margin-top:30px;
position:relative;
display:inline-block;
}

#guide img{
width:90vw;
max-width:700px;
opacity:0.35;
}

#vrframe{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
height:100%;
aspect-ratio:1/1;
border:4px solid red;
box-sizing:border-box;
}

#qr{
margin-top:40px;
}

</style>
</head>

<body>

<h1>Third Person Party Cam</h1>

<button onclick="start()">Start Camera</button>

<div id="qr"></div>

<script>

function start(){

const room = Math.random().toString(36).substring(2,8)

const camURL =
"https://vdo.ninja/?push="+room+
"&webcam&autostart"

const vrURL =
window.location.origin +
window.location.pathname.replace("camera.html","vr.html") +
"?room="+room

window.open(camURL,"_blank")

const canvas = document.createElement("canvas")
document.getElementById("qr").appendChild(canvas)

QRCode.toCanvas(canvas, vrURL,{width:260})

}

</script>

</body>
</html>
