<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Third Person Party Cam</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
margin:0;
padding:20px;
}

button{
font-size:20px;
padding:15px 30px;
margin:20px;
}

video{
width:100%;
max-width:600px;
border-radius:10px;
margin-top:20px;
}

#qr{
margin-top:40px;
}
</style>
</head>

<body>

<h1>Third Person Party-Cam</h1>

<button id="startBtn">Start Third Person Party-Cam</button>

<br>

<video id="video" autoplay playsinline></video>

<div id="qr"></div>

<script>

const startBtn = document.getElementById("startBtn");
const video = document.getElementById("video");
const qrDiv = document.getElementById("qr");

let peer;
let stream;

startBtn.onclick = async () => {

startBtn.style.display="none";

stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment"
},
audio:false
});

video.srcObject = stream;

peer = new Peer();

peer.on("open", id => {

const vrLink =
window.location.origin +
window.location.pathname.replace("camera.html","vr.html") +
"?cam=" + id;

QRcode = document.createElement("canvas");
qrDiv.appendChild(QRcode);

QRCode.toCanvas(QRcode, vrLink, {width:250});

const text = document.createElement("p");
text.innerText="Scanna denna QR-kod med VR-telefonen";
qrDiv.appendChild(text);

});

peer.on("call", call => {
call.answer(stream);
});

};

</script>

</body>
</html>
