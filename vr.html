<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR View</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
}

#container{
display:none;
width:100vw;
height:100vh;
}

video{
width:50vw;
height:100vh;
object-fit:cover;
}

button{
font-size:20px;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<h2>Start VR</h2>
<button id="startVR">Enter VR Mode</button>

<div id="container">
<video id="left" autoplay playsinline></video>
<video id="right" autoplay playsinline></video>
</div>

<script>

const params = new URLSearchParams(location.search);
const camId = params.get("cam");

const left = document.getElementById("left");
const right = document.getElementById("right");

const startBtn = document.getElementById("startVR");
const container = document.getElementById("container");

startBtn.onclick = () => {

startBtn.style.display="none";
container.style.display="flex";

const peer = new Peer();

peer.on("open", ()=>{

const call = peer.call(camId,null);

call.on("stream", stream => {

left.srcObject = stream;
right.srcObject = stream;

});

});

};

</script>

</body>
</html>
