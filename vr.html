<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Viewer</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
margin:0;
background:black;
}

#videos{
display:flex;
width:100%;
height:100vh;
}

video{
width:50%;
object-fit:cover;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:sans-serif;
}

button{
font-size:16px;
padding:8px;
}

</style>

</head>

<body>

<div id="ui">
<button onclick="enterVR()">Enter VR</button>
</div>

<div id="videos">

<video id="left" autoplay playsinline></video> <video id="right" autoplay playsinline></video>

</div>

<script>

const params = new URLSearchParams(location.search);
const camId = params.get("cam");

const peer = new Peer();

peer.on("open", id => {

const call = peer.call(camId,null);

call.on("stream", stream => {

document.getElementById("left").srcObject = stream;
document.getElementById("right").srcObject = stream;

});

});

function enterVR(){

document.documentElement.requestFullscreen();

}

</script>

</body>
</html>
