<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Mode</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
display:flex;
}

.eye{
width:50vw;
height:100vh;
overflow:hidden;
position:relative;
}

iframe{
position:absolute;
width:120vw;
height:120vh;
left:-10vw;
top:-10vh;
border:none;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
padding:20px 40px;
z-index:10;
}

</style>
</head>

<body>

<button id="start">Start VR</button>

<script>

const params = new URLSearchParams(location.search)
const room = params.get("room")

const viewURL =
"https://vdo.ninja/?view="+room+"&cleanoutput&autoplay"

const startBtn = document.getElementById("start")

startBtn.onclick = () => {

startBtn.remove()

const leftEye = document.createElement("div")
const rightEye = document.createElement("div")

leftEye.className = "eye"
rightEye.className = "eye"

const left = document.createElement("iframe")
const right = document.createElement("iframe")

left.src = viewURL
right.src = viewURL

leftEye.appendChild(left)
rightEye.appendChild(right)

document.body.appendChild(leftEye)
document.body.appendChild(rightEye)

}

</script>

</body>
</html>
