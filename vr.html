<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR View</title>

<style>

html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
}

#container{
display:flex;
width:100vw;
height:100vh;
}

.eye{
width:50vw;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:black;
}

video{
width:100%;
height:auto;
}

</style>
</head>

<body>

<div id="container">

<div class="eye">
<video id="left" autoplay playsinline></video>
</div>

<div class="eye">
<video id="right" autoplay playsinline></video>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const room = params.get("room")

const streamURL =
"https://vdo.ninja/?view="+room+"&clean&autostart&mute"

document.getElementById("left").src = streamURL
document.getElementById("right").src = streamURL

</script>

</body>
</html>
