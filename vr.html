<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR View</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

#container{
display:flex;
width:100vw;
height:100vh;
}

video{
width:50vw;
height:100vh;
object-fit:cover;
}
</style>
</head>

<body>

<div id="container">
<video id="left" autoplay playsinline></video>
<video id="right" autoplay playsinline></video>
</div>

<script>

const params = new URLSearchParams(location.search);
const camId = params.get("cam");

const left = document.getElementById("left");
const right = document.getElementById("right");

const peer = new Peer();

peer.on("open", ()=>{

const call = peer.call(camId,null);

call.on("stream", stream => {

left.srcObject = stream;
right.srcObject = stream;

});

});

</script>

</body>
</html>
