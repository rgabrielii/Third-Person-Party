<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR View</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
}

#start{
font-size:22px;
padding:20px;
margin-top:40px;
}

#vr{
display:none;
width:100vw;
height:100vh;
}

video{
width:50vw;
height:100vh;
object-fit:cover;
}

</style>
</head>

<body>

<h2>VR Viewer</h2>

<button id="start">Start VR</button>

<div id="vr">
<video id="left" autoplay playsinline></video>
<video id="right" autoplay playsinline></video>
</div>

<script>

const params = new URLSearchParams(window.location.search)
const camId = params.get("cam")

const startBtn = document.getElementById("start")
const vrDiv = document.getElementById("vr")

const left = document.getElementById("left")
const right = document.getElementById("right")

startBtn.onclick = () => {

startBtn.style.display="none"
vrDiv.style.display="flex"

const peer = new Peer()

peer.on("open", id => {

const call = peer.call(camId, new MediaStream())

call.on("stream", stream => {

left.srcObject = stream
right.srcObject = stream

})

})

}

</script>

</body>
</html>
