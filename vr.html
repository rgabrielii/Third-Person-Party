<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR View</title>

<style>

body{
margin:0;
background:black;
display:flex;
}

iframe{
width:50vw;
height:100vh;
border:none;
}

</style>
</head>

<body>

<script>

const params = new URLSearchParams(location.search)
const room = params.get("room")

const view =
"https://vdo.ninja/?view="+room+"&autoplay&cleanoutput"

document.body.innerHTML =
'<iframe src="'+view+'"></iframe>'+
'<iframe src="'+view+'"></iframe>'

</script>

</body>
</html>
