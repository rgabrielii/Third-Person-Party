<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Viewer</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
}

#video{
width:100vw;
height:100vh;
object-fit:cover;
background:black;
}

button{
font-size:22px;
padding:20px;
margin-top:30px;
}

</style>
</head>

<body>

<h2>Start VR</h2>

<button id="start">Connect Camera</button>

<br>

<video id="video" autoplay playsinline></video>

<script>

const params = new URLSearchParams(window.location.search)
const camId = params.get("cam")

const video = document.getElementById("video")
const startBtn = document.getElementById("start")

startBtn.onclick = () => {

const peer = new Peer()

peer.on("open", () => {

const call = peer.call(camId, new MediaStream())

call.on("stream", stream => {

video.srcObject = stream

})

})

}

</script>

</body>
</html>
