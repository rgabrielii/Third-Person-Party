<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Mode</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

#container{
display:flex;
width:100vw;
height:100vh;
}

.eye{
width:50vw;
height:100vh;
overflow:hidden;
}

.eye iframe{
width:100vw;
height:100vh;
border:none;
}

#start{
position:absolute;
top:50%;
left:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
padding:20px 40px;
z-index:10;
}

</style>
</head>

<body>

<button id="start">Start VR</button>

<div id="container" style="display:none;">
<div class="eye" id="leftEye"></div>
<div class="eye" id="rightEye"></div>
</div>

<script>

const params = new URLSearchParams(location.search)
const room = params.get("room")

const viewURL =
"https://vdo.ninja/?view="+room+"&cleanoutput&autoplay"

const startBtn = document.getElementById("start")
const container = document.getElementById("container")

startBtn.onclick = () => {

startBtn.remove()
container.style.display="flex"

const frame = document.createElement("iframe")
frame.src = viewURL

document.getElementById("leftEye").appendChild(frame)

const frameClone = frame.cloneNode()
frameClone.src = viewURL + "&v=" + Math.random()

document.getElementById("rightEye").appendChild(frameClone)

}

</script>

</body>
</html>
