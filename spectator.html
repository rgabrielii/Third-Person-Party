<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Publikvy</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body { margin:0; overflow:hidden; }
canvas { width:100%; height:100vh; display:block; }
</style>
</head>
<body>
<canvas id="spectatorCanvas"></canvas>
<script>
const videoEl = document.createElement("video");
videoEl.autoplay = true;
videoEl.playsInline = true;

const canvas = document.getElementById("spectatorCanvas");
const ctx = canvas.getContext("2d");

// Peer-ID från URL
const params = new URLSearchParams(location.search);
const camId = params.get("cam");

// PeerJS
const peer = new Peer();
peer.on("open", ()=> {
  const call = peer.call(camId,null);
  call.on("stream", stream => {
    videoEl.srcObject = stream;
  });
});

function drawLoop() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  if(videoEl.readyState >=2){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);

    // HUD exempel: namn eller info
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(10,10,200,50);
    ctx.fillStyle = "#fff";
    ctx.font = "20px Arial";
    ctx.fillText("Spelare 1", 20,40);
  }

  requestAnimationFrame(drawLoop);
}
drawLoop();
</script>
</body>
</html>
